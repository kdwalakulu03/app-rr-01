version: '3.8'

# Production — Docker postgres + backend only
# System nginx handles SSL + routing (no Docker nginx needed)

services:
  postgres:
    image: imresamu/postgis:16-3.4
    container_name: nn4_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nearnow4}
    ports:
      - "127.0.0.1:5847:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nn4_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-nearnow4}
      PORT: 3847
      NODE_ENV: production
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-near-now2}
    ports:
      - "127.0.0.1:3847:3847"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
