# app.roamricher.com — NearNow4 / Roam Richer
# Place at: /etc/nginx/sites-available/roamricher
# Then: sudo ln -s /etc/nginx/sites-available/roamricher /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.roamricher.com;
    return 301 https://app.roamricher.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.roamricher.com;

    # SSL — run certbot first (see deploy.md)
    ssl_certificate     /etc/letsencrypt/live/app.roamricher.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.roamricher.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API → Docker backend on 3847
    location /api/ {
        proxy_pass         http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    Frontend # static files 
    root /opt/roamricher/app/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
